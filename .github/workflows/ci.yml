name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      # dist (needed by fds drift-lock tests) is gitignored, so build first.
      - run: pnpm install
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test
