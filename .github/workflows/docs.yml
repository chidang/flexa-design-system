# Deploy the FDS docs site (apps/fds-docs) to GitHub Pages.
# One-time repo setting required: Settings → Pages → Source = "GitHub Actions",
# Custom domain = fds.sitebefy.com (kept across deploys by apps/fds-docs/public/CNAME).
name: Deploy FDS docs

on:
  push:
    branches: [main]
    paths:
      - 'apps/fds-docs/**'
      - 'packages/fds/**'
      - 'packages/core/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # reads packageManager from package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @flexa/fds-docs build
        # Served at the custom domain root (fds.sitebefy.com, public/CNAME) — no
        # basePath. For a bare project-Pages URL set DOCS_BASE_PATH here instead.
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/fds-docs/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
